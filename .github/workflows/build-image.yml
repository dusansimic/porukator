name: build-image

# Reusable: build one image from a Dockerfile and push it to GHCR.
on:
  workflow_call:
    inputs:
      name:
        description: Image name under ghcr.io/dusansimic/porukator/
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile (build context is the repo root)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dusansimic/porukator/${{ inputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Consumed only by the webui image (shown under the UI title); the
          # server Dockerfile ignores it.
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.name }}
