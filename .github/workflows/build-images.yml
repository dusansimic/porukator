name: build-images

# Build each image only when files affecting it change. On tags and manual
# runs, both images are always built (releases).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Lint + format gate, mirroring the pre-commit hooks (single source of truth):
  # buf lint, gofmt, go vet, biome. Images are only built if this passes.
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install web UI deps
        working-directory: webui
        run: pnpm install --frozen-lockfile

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Run lint + format checks
        run: pre-commit run --all-files --show-diff-on-failure --color always

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            server:
              - 'cmd/**'
              - 'internal/**'
              - 'pkg/**'
              - 'gen/**'
              - 'queries/**'
              - 'go.mod'
              - 'go.sum'
              - 'deployments/Dockerfile.server'
              - '.dockerignore'
              - '.github/workflows/build-image.yml'
              - '.github/workflows/build-images.yml'
            webui:
              - 'webui/**'
              - 'deployments/Dockerfile.webui'
              - 'deployments/nginx.conf'
              - '.dockerignore'
              - '.github/workflows/build-image.yml'
              - '.github/workflows/build-images.yml'

  server:
    needs: [checks, changes]
    if: ${{ needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      name: server
      dockerfile: deployments/Dockerfile.server

  webui:
    needs: [checks, changes]
    if: ${{ needs.changes.outputs.webui == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      name: webui
      dockerfile: deployments/Dockerfile.webui
