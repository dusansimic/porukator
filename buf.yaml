version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # ListClients is intentionally shared between Admin and Producer, and the
    # job stream's element type reads better as Job than StreamJobsResponse.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
