# Serves the Porukator SPA static bundle. Nothing more — an external reverse
# proxy fronts this container and routes ConnectRPC paths (/porukator.v1.*) to
# the backend and everything else here. The SPA issues same-origin requests, so
# they reach the backend through that external proxy.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache fingerprinted assets aggressively; never cache the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
