name: porukator

services:
  postgres:
    image: postgres:17-alpine
    container_name: porukator_postgres
    hostname: postgres
    environment:
      POSTGRES_USER: porukator
      POSTGRES_PASSWORD: porukator
      POSTGRES_DB: porukator
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - porukator_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porukator -d porukator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  porukator:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: porukator
    hostname: porukator
    environment:
      PORUKATOR_HTTP_ADDR: ":8080"
      PORUKATOR_HTTP_PUBLIC_HOST: "http://localhost:8080"
      PORUKATOR_POSTGRES_URL: "postgres://porukator:porukator@postgres:5432/porukator?sslmode=disable"
      PORUKATOR_AUTH_MASTER_PASSWORD: "change-me"
      PORUKATOR_LOGGING_LEVEL: "info"
      PORUKATOR_LOGGING_FORMAT: "json"
      PORUKATOR_APP_ENV: "production"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - porukator_internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:

networks:
  porukator_internal:
